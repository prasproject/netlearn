name: netlearn
description: "NetLearn — Interactive LMS for Computer Networking Education"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2

  # Audio
  audioplayers: ^6.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  get_storage: ^2.1.1

  # PDF Export
  pdf: ^3.11.2
  excel: ^4.0.6
  path_provider: ^2.1.5
  open_filex: ^4.5.0

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_database: any
  firebase_analytics: any
  firebase_messaging: any
  google_sign_in: any

  # Icons & Animations
  cupertino_icons: ^1.0.8
  lottie: any
  flutter_welcome_kit: ^2.0.0
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  youtube_player_iframe: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/audio/
